services:

  # ─── HBase standalone con Thrift server (acceso desde Python via happybase) ──
  hbase:
    image: dajobe/hbase
    container_name: hbase
    ports:
      - "16000:16000"   # HBase Master RPC
      - "16010:16010"   # HBase Master Web UI  →  http://localhost:16010
      - "16020:16020"   # RegionServer RPC
      - "16030:16030"   # RegionServer Web UI
      - "9090:9090"     # Thrift API  ←  usado por happybase en Python
      - "9095:9095"     # Thrift Web UI
      - "2181:2181"     # ZooKeeper
    environment:
      - HBASE_MANAGES_ZK=true
    networks:
      - labnet

  # ─── MongoDB 7 ───────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: ecommerce
    volumes:
      - mongo_data:/data/db
    networks:
      - labnet

  # ─── Redis 7 ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --appendonly yes
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - labnet

volumes:
  mongo_data:
  redis_data:

networks:
  labnet:
    driver: bridge
